services:
  postgres:
    image: postgres:16
    container_name: portfolio_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: portfolio_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: portfolio-local-secret
      _PIP_ADDITIONAL_REQUIREMENTS: pandas requests SQLAlchemy psycopg2-binary
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/data_projects
      PORTFOLIO_REPO_ROOT: /opt/airflow/repo
    volumes:
      - .:/opt/airflow/repo
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Portfolio
      --lastname Admin
      --role Admin
      --email admin@example.com || true"

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: portfolio_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: portfolio-local-secret
      _PIP_ADDITIONAL_REQUIREMENTS: pandas requests SQLAlchemy psycopg2-binary
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/data_projects
      PORTFOLIO_REPO_ROOT: /opt/airflow/repo
      LOG_INPUT_PATH: /opt/airflow/repo/project_7_log_pipeline/data/app.log
      LOG_STATE_PATH: /opt/airflow/repo/project_7_log_pipeline/state/log_state.json
    ports:
      - "8081:8080"
    volumes:
      - .:/opt/airflow/repo
      - ./dags:/opt/airflow/dags
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: portfolio_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: portfolio-local-secret
      _PIP_ADDITIONAL_REQUIREMENTS: pandas requests SQLAlchemy psycopg2-binary
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/data_projects
      PORTFOLIO_REPO_ROOT: /opt/airflow/repo
      LOG_INPUT_PATH: /opt/airflow/repo/project_7_log_pipeline/data/app.log
      LOG_STATE_PATH: /opt/airflow/repo/project_7_log_pipeline/state/log_state.json
    volumes:
      - .:/opt/airflow/repo
      - ./dags:/opt/airflow/dags
    command: scheduler

volumes:
  postgres_data:

