services:
  postgres:
    image: postgres:16
    container_name: portfolio_sales_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: data_projects
    ports:
      - "5432:5432"
    volumes:
      - sales_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d data_projects"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sales_postgres_data:

